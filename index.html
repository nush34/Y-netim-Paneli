<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tolgattoo | Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        input, select, option { color-scheme: dark; }
        .login-bg { background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; color: black !important; } }
    </style>
</head>
<body>
    <div id="app">
        
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[9999] login-bg flex items-center justify-center p-6 text-center">
            <div class="max-w-md w-full glass p-10 rounded-[3rem] shadow-2xl border-amber-500/10">
                <i data-lucide="lock" class="text-amber-500 w-12 h-12 mx-auto mb-6"></i>
                <h1 class="text-3xl font-black italic uppercase tracking-widest mb-8">tolgattoo</h1>
                <form @submit.prevent="checkPassword" class="space-y-4">
                    <input v-model="passInput" type="password" placeholder="Şifre" class="w-full bg-neutral-900 border border-neutral-800 p-5 rounded-2xl outline-none focus:border-amber-500 text-center text-2xl tracking-widest">
                    <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 p-5 rounded-2xl font-black uppercase tracking-widest transition-all">Giriş Yap</button>
                    <p v-if="loginError" class="text-red-500 text-xs font-bold animate-pulse">Hatalı Şifre!</p>
                </form>
            </div>
        </div>

        <template v-else>
            <aside class="w-64 bg-black border-r border-neutral-900 p-6 flex flex-col fixed h-full no-print">
                <div class="mb-10 text-center flex flex-col items-center">
                    <div class="w-28 h-28 mb-4 rounded-3xl border border-amber-500/20 p-2 bg-neutral-900/30 flex items-center justify-center shadow-2xl">
                        <img src="logo.png" alt="logo" class="w-full h-full object-contain">
                    </div>
                    <h1 class="text-amber-500 font-black text-xl italic uppercase tracking-widest">tolgattoo</h1>
                </div>
                
                <nav class="space-y-3 flex-1">
                    <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'bg-amber-600 text-white' : 'text-neutral-500 hover:text-amber-500'" class="w-full flex items-center gap-3 px-5 py-4 rounded-2xl transition-all text-sm font-bold uppercase tracking-wider">
                        <i data-lucide="layout-dashboard"></i> Akış
                    </button>
                    <button @click="openAddView" :class="view === 'add-customer' ? 'bg-amber-600 text-white' : 'text-neutral-500 hover:text-amber-500'" class="w-full flex items-center gap-3 px-5 py-4 rounded-2xl transition-all text-sm font-bold uppercase tracking-wider">
                        <i data-lucide="plus-circle"></i> Yeni Kayıt
                    </button>
                </nav>
                <button @click="logout" class="text-[10px] text-neutral-700 hover:text-red-500 transition-colors uppercase font-black text-center w-full tracking-[0.3em]">Güvenli Çıkış</button>
            </aside>

            <main class="ml-64 p-8 no-print">
                <div v-if="loading" class="flex flex-col items-center justify-center h-96 text-amber-500 italic"><i data-lucide="refresh-cw" class="animate-spin w-10 h-10 mb-4"></i></div>

                <div v-else-if="view === 'dashboard'">
                    <div class="flex justify-between items-end mb-10">
                        <h2 class="text-4xl font-black italic uppercase">Stüdyo Durumu</h2>
                        <div class="glass p-3 rounded-2xl flex items-center gap-3">
                            <input v-model="filterStart" type="date" class="bg-transparent text-xs text-amber-500 outline-none">
                            <span class="text-neutral-700">/</span>
                            <input v-model="filterEnd" type="date" class="bg-transparent text-xs text-amber-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                        <div class="glass p-6 rounded-[2rem] border-l-4 border-l-amber-600">
                            <p class="text-[9px] text-neutral-500 font-bold uppercase tracking-widest mb-1">Toplam Ciro</p>
                            <p class="text-3xl font-black">{{ totalRevenue }} ₺</p>
                        </div>
                        <div class="glass p-6 rounded-[2rem] border-l-4 border-l-emerald-600">
                            <p class="text-[9px] text-neutral-500 font-bold uppercase tracking-widest mb-1">Nakit Tahsilat</p>
                            <p class="text-3xl font-black text-emerald-500">{{ totalCash }} ₺</p>
                        </div>
                        <div class="glass p-6 rounded-[2rem] border-l-4 border-l-blue-600">
                            <p class="text-[9px] text-neutral-500 font-bold uppercase tracking-widest mb-1">Kart Tahsilat</p>
                            <p class="text-3xl font-black text-blue-500">{{ totalCard }} ₺</p>
                        </div>
                        <div class="glass p-6 rounded-[2rem] border-l-4 border-l-red-600">
                            <p class="text-[9px] text-neutral-500 font-bold uppercase tracking-widest mb-1">Toplam Alacak</p>
                            <p class="text-3xl font-black text-red-500">{{ totalRevenue - (totalCash + totalCard) }} ₺</p>
                        </div>
                    </div>

                    <div class="glass p-8 rounded-[3rem]">
                        <input v-model="search" placeholder="Müşteri ismi ara..." class="w-full bg-neutral-900 border border-neutral-800 p-5 rounded-2xl mb-8 outline-none focus:border-amber-500 transition-all">
                        
                        <div class="space-y-4">
                            <div v-for="c in filteredCustomers" :key="c.id" class="flex items-center gap-6 p-5 bg-white/[0.01] border border-white/[0.04] rounded-[2rem] hover:bg-white/[0.03] transition-all">
                                <div class="w-16 h-16 shrink-0 cursor-zoom-in" @click="zoomedImg = c.image">
                                    <img :src="c.image || 'https://via.placeholder.com/150/111/333?text=IMG'" class="w-full h-full object-cover rounded-xl border border-white/10">
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <h4 class="font-bold text-xl">{{ c.name }}</h4>
                                        <span class="text-[9px] px-2 py-0.5 rounded-full bg-neutral-800 text-neutral-400 font-bold uppercase tracking-tighter">
                                            {{ c.source === 'Kapı' ? '🚪 Kapı' : '📱 Sosyal Medya' }}
                                        </span>
                                    </div>
                                    <div class="flex gap-4 text-[11px] text-neutral-500">
                                        <span>📅 {{ c.date }}</span>
                                        <span>🖋️ {{ c.artist }}</span>
                                    </div>
                                    <div class="flex gap-1 mt-3">
                                        <span v-for="p in c.payments" class="text-[9px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded-md border border-emerald-500/20">
                                            {{ p.amount }}₺ ({{ p.method === 'Kart' ? '💳' : '💵' }})
                                        </span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-black">{{ c.price }} ₺</p>
                                    <p class="text-[10px] font-bold" :class="calculateTotalPaid(c) >= c.price ? 'text-emerald-500' : 'text-red-500'">
                                        {{ calculateTotalPaid(c) >= c.price ? 'ÖDENDİ' : (c.price - calculateTotalPaid(c)) + ' ₺ KALDI' }}
                                    </p>
                                    <div class="flex gap-1 mt-3 justify-end">
                                        <button @click="sendCareGuide(c)" class="p-2 text-amber-500 hover:bg-white/5 rounded-lg"><i data-lucide="sparkles" class="w-4 h-4"></i></button>
                                        <button @click="sendWhatsApp(c)" class="p-2 text-emerald-500 hover:bg-white/5 rounded-lg"><i data-lucide="message-circle" class="w-4 h-4"></i></button>
                                        <button @click="startEdit(c)" class="p-2 text-neutral-400 hover:bg-white/5 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                        <button @click="deleteCustomer(c.id)" class="p-2 text-red-500 hover:bg-white/5 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-else-if="view === 'add-customer' || view === 'edit-customer'" class="max-w-4xl mx-auto glass p-10 rounded-[3rem]">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-3xl font-black italic uppercase">{{ view === 'edit-customer' ? 'Düzenle' : 'Yeni Kayıt' }}</h2>
                        <button @click="view = 'dashboard'" class="text-neutral-500 hover:text-white"><i data-lucide="x"></i></button>
                    </div>

                    <form @submit.prevent="handleSubmit" class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-4">
                                <input v-model="form.name" placeholder="Müşteri Ad Soyad" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none focus:border-amber-500">
                                <input v-model="form.phone" placeholder="Telefon" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none focus:border-amber-500">
                                <div class="grid grid-cols-2 gap-4">
                                    <input v-model="form.date" type="date" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none text-sm">
                                    <input v-model="form.time" type="time" class="bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none text-sm">
                                </div>
                                <select v-model="form.source" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none">
                                    <option value="Sosyal Medya">Sosyal Medya</option>
                                    <option value="Kapı">Kapı Müşterisi</option>
                                </select>
                                <div class="relative aspect-square rounded-[2rem] bg-neutral-900 border-2 border-dashed border-neutral-800 flex items-center justify-center overflow-hidden">
                                    <img v-if="form.image" :src="form.image" class="w-full h-full object-cover">
                                    <span v-else class="text-xs text-neutral-600 uppercase font-bold">Resim Yükle</span>
                                    <input type="file" @change="handleFileUpload" class="absolute inset-0 opacity-0 cursor-pointer">
                                </div>
                            </div>

                            <div class="space-y-6">
                                <input v-model="form.artist" placeholder="Sanatçı (Artist)" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none">
                                <div class="p-5 bg-amber-600/5 border border-amber-600/20 rounded-2xl">
                                    <p class="text-[10px] text-amber-500 font-bold uppercase mb-2">Toplam Bedel</p>
                                    <input v-model.number="form.price" type="number" class="w-full bg-transparent text-4xl font-black outline-none">
                                </div>

                                <div class="space-y-4">
                                    <div class="flex justify-between items-center px-2">
                                        <h5 class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Ödemeler</h5>
                                        <button type="button" @click="addPaymentField" class="text-emerald-500 text-xs">+ Ekle</button>
                                    </div>
                                    <div class="space-y-2">
                                        <div v-for="(pay, idx) in form.payments" :key="idx" class="flex gap-2">
                                            <input v-model.number="pay.amount" type="number" placeholder="₺" class="w-20 bg-black border border-neutral-800 p-2 rounded-xl text-sm">
                                            <select v-model="pay.method" class="w-20 bg-black border border-neutral-800 p-2 rounded-xl text-[10px]">
                                                <option value="Nakit">Nakit</option>
                                                <option value="Kart">Kart</option>
                                            </select>
                                            <input v-model="pay.date" type="date" class="flex-1 bg-black border border-neutral-800 p-2 rounded-xl text-[10px]">
                                            <button @click="form.payments.splice(idx,1)" class="text-red-900 p-1"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" :disabled="saving" class="w-full bg-amber-600 p-6 rounded-3xl font-black text-xl tracking-[0.4em] transition-all shadow-2xl shadow-amber-900/40">
                            {{ saving ? 'İŞLENİYOR...' : 'KAYDET' }}
                        </button>
                    </form>
                </div>
            </main>

            <div v-if="zoomedImg" @click="zoomedImg = null" class="fixed inset-0 z-[10000] login-bg flex items-center justify-center p-6 cursor-zoom-out">
                <img :src="zoomedImg" class="max-w-full max-h-full rounded-3xl shadow-3xl animate-in zoom-in-95 duration-300">
            </div>
        </template>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnzDQHJ9BZ-0NfZRqjggTsJZtn-fgFHY4",
            authDomain: "tolgatto-panel.firebaseapp.com",
            projectId: "tolgatto-panel",
            storageBucket: "tolgatto-panel.firebasestorage.app",
            messagingSenderId: "361836880672",
            appId: "1:361836880672:web:126ea91110d44a8dd66d45"
        };

        const fb = initializeApp(firebaseConfig);
        const db = getFirestore(fb);
        const colRef = collection(db, "customers");

        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    isLoggedIn: false, passInput: '', loginError: false, correctPassword: 'tattoo2024',
                    view: 'dashboard', loading: true, saving: false, search: '',
                    filterStart: '', filterEnd: '', zoomedImg: null, customers: [],
                    form: { id: null, name: '', phone: '', date: '', time: '', artist: '', source: 'Sosyal Medya', price: 0, payments: [], image: '' }
                }
            },
            computed: {
                filteredCustomers() {
                    let list = this.customers.filter(c => c.name?.toLowerCase().includes(this.search.toLowerCase()));
                    if (this.filterStart) list = list.filter(c => c.date >= this.filterStart);
                    if (this.filterEnd) list = list.filter(c => c.date <= this.filterEnd);
                    return list;
                },
                totalRevenue() { return this.filteredCustomers.reduce((s,c) => s + (Number(c.price) || 0), 0); },
                totalCash() { return this.filteredCustomers.reduce((s,c) => s + this.calcByMethod(c, 'Nakit'), 0); },
                totalCard() { return this.filteredCustomers.reduce((s,c) => s + this.calcByMethod(c, 'Kart'), 0); }
            },
            methods: {
                checkPassword() {
                    if(this.passInput === this.correctPassword) { this.isLoggedIn = true; localStorage.setItem('tolga_auth', 'active'); }
                    else { this.loginError = true; }
                },
                logout() { this.isLoggedIn = false; localStorage.removeItem('tolga_auth'); },
                calcByMethod(c, method) {
                    return (c.payments || []).filter(p => p.method === method).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                },
                calculateTotalPaid(c) {
                    return (c.payments || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                },
                addPaymentField() {
                    this.form.payments.push({ amount: 0, date: new Date().toISOString().split('T')[0], method: 'Nakit' });
                },
                sendCareGuide(c) {
                    const msg = `Selam ${c.name} ✨ Dövmen bitti, hayırlı olsun! Bakım rehberine buradan ulaşabilirsin: https://tolgattoo.com/bakim`;
                    this.openWA(c.phone, msg);
                },
                sendWhatsApp(c) {
                    const msg = `Selam ${c.name}, yarın saat ${c.time} randevunu hatırlatmak istedim. Görüşürüz!`;
                    this.openWA(c.phone, msg);
                },
                openWA(phone, text) {
                    let p = phone.replace(/\D/g,'');
                    if(p.startsWith('5')) p = '90' + p;
                    window.open(`https://wa.me/${p}?text=${encodeURIComponent(text)}`, '_blank');
                },
                async handleSubmit() {
                    this.saving = true;
                    const { id, ...data } = this.form;
                    if (id) await updateDoc(doc(db, "customers", id), data);
                    else await addDoc(colRef, { ...data, createdAt: Date.now() });
                    this.view = 'dashboard';
                    this.saving = false;
                },
                async deleteCustomer(id) { if(confirm("Silinsin mi?")) await deleteDoc(doc(db, "customers", id)); },
                startEdit(c) { this.form = JSON.parse(JSON.stringify(c)); this.view = 'edit-customer'; },
                openAddView() {
                    this.form = { id: null, name: '', phone: '', date: '', time: '', artist: '', source: 'Sosyal Medya', price: 0, payments: [{amount:0, date: new Date().toISOString().split('T')[0], method: 'Nakit'}], image: '' };
                    this.view = 'add-customer';
                },
                handleFileUpload(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => this.form.image = ev.target.result;
                        reader.readAsDataURL(file);
                    }
                }
            },
            mounted() {
                if(localStorage.getItem('tolga_auth') === 'active') this.isLoggedIn = true;
                onSnapshot(query(colRef, orderBy("date", "desc")), (snap) => {
                    this.customers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.loading = false;
                    setTimeout(() => lucide.createIcons(), 200);
                });
            },
            updated() { lucide.createIcons(); }
        }).mount('#app');
    </script>
</body>
</html>
