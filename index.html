                                <input v-model="filterEnd" type="date" class="bg-black/40 border border-neutral-800 p-2 rounded-xl text-xs text-amber-500 outline-none">
                            </div>
                            <button @click="resetDates" class="mt-4 text-[9px] font-bold text-neutral-700 hover:text-white uppercase">Sıfırla</button>
                        </div>

                        <div class="flex gap-8 border-l border-neutral-800 pl-8">
                            <div class="text-center">
                                <p class="text-[9px] font-bold text-neutral-500 uppercase mb-1">Dönemlik Satış</p>
                                <p class="text-2xl font-black text-white">{{ filteredList.length }} <span class="text-[10px] text-neutral-600 uppercase">Adet</span></p>
                            </div>
                            <div class="text-center">
                                <p class="text-[9px] font-bold text-neutral-500 uppercase mb-1">Dönem Cirosu</p>
                                <p class="text-2xl font-black text-emerald-500">{{ totalRevenueInRange }} ₺</p>
                            </div>
                            <div v-if="filterStatus === 'completed'" class="text-center">
                                <p class="text-[9px] font-bold text-neutral-500 uppercase mb-1">Tahsil Edilen</p>
                                <p class="text-2xl font-black text-blue-500">{{ totalPaidInRange }} ₺</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass p-8 rounded-[3rem]">
                        <input v-model="search" :placeholder="filterStatus === 'completed' ? 'Müşteri ismi ile ara...' : 'İsim veya gerekçe ara...'" class="w-full bg-neutral-900 border border-neutral-800 p-5 rounded-2xl mb-8 outline-none focus:border-amber-500 transition-all text-sm">
                        
                        <div class="space-y-4">
                            <div v-for="c in filteredList" :key="c.id" class="flex items-center gap-6 p-5 bg-white/[0.01] border border-white/[0.04] rounded-[2rem] hover:bg-white/[0.03] transition-all">
                                <div class="w-16 h-16 shrink-0 rounded-xl overflow-hidden border border-white/10 shadow-lg">
                                    <img :src="c.image || 'https://via.placeholder.com/150/111/333?text=FOTO'" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-3">
                                        <h4 class="font-bold text-xl">{{ c.name }}</h4>
                                        <span class="text-[9px] px-2 py-0.5 rounded-full bg-neutral-800 text-neutral-400 font-bold uppercase tracking-widest">{{ c.style }}</span>
                                    </div>
                                    <p v-if="c.status === 'potential'" class="text-xs text-amber-500/70 mt-1 italic font-medium">🚩 "{{ c.reason }}": {{ c.note }}</p>
                                    <div class="flex gap-4 text-[10px] text-neutral-500 mt-2 font-bold uppercase tracking-widest">
                                        <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> {{ c.date }}</span>
                                        <span class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i> {{ c.artist }}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-black text-white leading-none">{{ c.price }} ₺</p>
                                    <p v-if="c.status === 'completed'" class="text-[9px] font-bold mt-1" :class="calcC(c) >= c.price ? 'text-emerald-500' : 'text-red-500'">
                                        {{ calcC(c) >= c.price ? 'TAMAMI ÖDENDİ' : (c.price - calcC(c)) + ' ₺ ALACAK' }}
                                    </p>
                                    <div class="flex gap-1 mt-3 justify-end">
                                        <button @click="sendWhatsApp(c)" class="p-2 text-emerald-500 hover:bg-white/5 rounded-lg transition-colors"><i data-lucide="message-circle" class="w-4 h-4"></i></button>
                                        <button @click="startEdit(c)" class="p-2 text-neutral-400 hover:bg-white/5 rounded-lg transition-colors"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                        <button @click="deleteCustomer(c.id)" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div v-if="filteredList.length === 0" class="text-center py-20 text-neutral-700 italic border-2 border-dashed border-neutral-900 rounded-[2rem]">
                                Belirtilen tarihlerde kayıt bulunmuyor...
                            </div>
                        </div>
                    </div>
                </div>

                <div v-else-if="view === 'add' || view === 'edit'" class="max-w-4xl mx-auto glass p-10 rounded-[3.5rem] shadow-3xl">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-3xl font-black italic uppercase">{{ view === 'edit' ? 'Güncelleme' : 'Yeni Randevu / Soru' }}</h2>
                        <button @click="view = 'dashboard'" class="bg-neutral-900 p-2 rounded-full hover:text-red-500 transition-colors"><i data-lucide="x"></i></button>
                    </div>
                    <form @submit.prevent="handleSubmit" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="space-y-5">
                            <select v-model="form.status" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none focus:border-amber-500 text-sm font-bold">
                                <option value="completed">✅ Satış / Randevu</option>
                                <option value="potential">⏳ Potansiyel (Soru-Fiyat)</option>
                            </select>
                            <input v-model="form.name" placeholder="Müşteri Ad Soyad" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none focus:border-amber-500">
                            <input v-model="form.phone" placeholder="WhatsApp Numarası" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none">
                            
                            <div v-if="form.status === 'potential'" class="space-y-4">
                                <select v-model="form.reason" class="w-full bg-neutral-900 border border-red-900/30 p-4 rounded-2xl outline-none text-xs">
                                    <option value="Maaşı alınca gelecek">Maaşı alınca gelecek</option>
                                    <option value="Ailesine danışacak">Ailesine danışacak</option>
                                    <option value="Düşünmek istiyor">Düşünmek istiyor</option>
                                    <option value="Sadece fiyat almak istedi">Sadece fiyat almak istedi</option>
                                    <option value="Fiyat yüksek geldi">Fiyat yüksek geldi</option>
                                </select>
                                <textarea v-model="form.note" placeholder="Detaylı notlar..." class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none h-24 text-sm"></textarea>
                            </div>

                            <div v-if="form.status === 'completed'" class="grid grid-cols-2 gap-4 text-xs font-bold">
                                <div class="flex flex-col"><label class="ml-1 mb-1 opacity-40">Tarih</label><input v-model="form.date" type="date" class="bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none"></div>
                                <div class="flex flex-col"><label class="ml-1 mb-1 opacity-40">Saat</label><input v-model="form.time" type="time" class="bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none"></div>
                            </div>
                        </div>

                        <div class="space-y-5">
                            <select v-model="form.style" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-2xl outline-none text-sm">
                                <option value="Çizgisel">Çizgisel</option>
                                <option value="Realistik">Realistik</option>
                                <option value="Cover Up">Cover Up</option>
                                <option value="Minimal">Minimal</option>
                                <option value="Renkli">Renkli</option>
                            </select>
                            <div class="p-6 bg-amber-600/5 border border-amber-600/20 rounded-3xl">
                                <p class="text-[9px] text-amber-500 font-bold uppercase mb-2 tracking-widest">Anlaşılan / Teklif Edilen Ücret</p>
                                <input v-model.number="form.price" type="number" class="w-full bg-transparent text-4xl font-black outline-none" placeholder="0 ₺">
                            </div>
                            <div v-if="form.status === 'completed'" class="space-y-3">
                                <div class="flex justify-between items-center px-1"><span class="text-[10px] font-bold text-neutral-600 uppercase">Tahsilat Kayıtları</span><button type="button" @click="addPay" class="text-emerald-500 text-[10px] font-bold">+ EKLE</button></div>
                                <div v-for="(p, i) in form.payments" :key="i" class="flex gap-2">
                                    <input v-model.number="p.amount" type="number" class="w-20 bg-black border border-neutral-800 p-2 rounded-xl text-sm font-bold">
                                    <select v-model="p.method" class="w-24 bg-black border border-neutral-800 p-2 rounded-xl text-[10px]">
                                        <option value="Nakit">Nakit</option><option value="Kart">Kart</option>
                                    </select>
                                    <button @click="form.payments.splice(i,1)" class="text-red-900 hover:text-red-500"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-amber-600 p-6 rounded-3xl font-black text-xl tracking-[0.4em] shadow-xl hover:bg-amber-500 transition-all mt-4">KAYDET</button>
                        </div>
                    </form>
                </div>
            </main>
        </template>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG (Kendi bilgilerini buraya tekrar yapıştır)
        const firebaseConfig = { apiKey: "AIzaSyAnzDQHJ9BZ-0NfZRqjggTsJZtn-fgFHY4", authDomain: "tolgatto-panel.firebaseapp.com", projectId: "tolgatto-panel", storageBucket: "tolgatto-panel.firebasestorage.app", messagingSenderId: "361836880672", appId: "1:361836880672:web:126ea91110d44a8dd66d45" };
        const fb = initializeApp(firebaseConfig);
        const db = getFirestore(fb);
        const colRef = collection(db, "customers");

        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    isLoggedIn: false, passInput: '', correctPassword: '312593',
                    view: 'dashboard', filterStatus: 'completed', loading: true, search: '',
                    filterStart: '', filterEnd: '', customers: [],
                    form: { id: null, status: 'completed', name: '', phone: '', date: '', time: '', style: 'Çizgisel', price: 0, reason: 'Düşünmek istiyor', note: '', payments: [] }
                }
            },
            computed: {
                filteredList() {
                    let list = this.customers.filter(c => c.status === this.filterStatus);
                    if (this.filterStart) list = list.filter(c => c.date >= this.filterStart);
                    if (this.filterEnd) list = list.filter(c => c.date <= this.filterEnd);
                    if (this.search) {
                        const s = this.search.toLowerCase();
                        list = list.filter(c => c.name?.toLowerCase().includes(s) || c.reason?.toLowerCase().includes(s));
                    }
                    return list;
                },
                totalRevenueInRange() { return this.filteredList.reduce((s,c) => s + (Number(c.price) || 0), 0); },
                totalPaidInRange() {
                    return this.filteredList.reduce((s,c) => s + (c.payments || []).reduce((ps, p) => ps + (Number(p.amount) || 0), 0), 0);
                }
            },
            methods: {
                checkPassword() { 
                    if(this.passInput === this.correctPassword) { 
                        this.isLoggedIn = true; 
                        localStorage.setItem('tolga_auth', 'active'); 
                        setTimeout(() => lucide.createIcons(), 100); 
                    } 
                },
                logout() { this.isLoggedIn = false; localStorage.removeItem('tolga_auth'); },
                resetDates() { this.filterStart = ''; this.filterEnd = ''; },
                calcC(c) { return (c.payments || []).reduce((s, p) => s + (Number(p.amount) || 0), 0); },
                addPay() { this.form.payments.push({ amount: 0, method: 'Nakit', date: new Date().toISOString().split('T')[0] }); },
                async handleSubmit() {
                    const { id, ...data } = this.form;
                    if(id) await updateDoc(doc(db, "customers", id), data);
                    else await addDoc(colRef, { ...data, createdAt: Date.now() });
                    this.view = 'dashboard';
                },
                async deleteCustomer(id) { if(confirm("Kaydı silmek istiyor musun?")) await deleteDoc(doc(db, "customers", id)); },
                startEdit(c) { this.form = JSON.parse(JSON.stringify(c)); this.view = 'edit'; },
                openAddView() {
                    this.form = { id: null, status: 'completed', name: '', phone: '', date: new Date().toISOString().split('T')[0], time: '', style: 'Çizgisel', price: 0, reason: 'Düşünmek istiyor', note: '', payments: [] };
                    this.view = 'add';
                },
                sendWhatsApp(c) {
                    let msg = c.status === 'completed' ? `Selam ${c.name}, randevunu hatırlatmak istedim.` : `Selam ${c.name}, sormuş olduğun ${c.style} dövme tasarımı için yardımcı olabilirim. Ne dersin?`;
                    let p = c.phone.replace(/\D/g,'');
                    if(p.startsWith('5')) p = '90' + p;
                    window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, '_blank');
                }
            },
            mounted() {
                if(localStorage.getItem('tolga_auth') === 'active') this.isLoggedIn = true;
                onSnapshot(query(colRef, orderBy("date", "desc")), (snap) => {
                    this.customers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.loading = false;
                    setTimeout(() => lucide.createIcons(), 200);
                });
            },
            updated() { lucide.createIcons(); }
        }).mount('#app');
    </script>
</body>
</html>
